<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artifact Browser</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Artifact Browser</h1>
        <div class="muted">根目录固定：/home/openclaw/.openclaw/workspace</div>
      </div>
      <div class="panel-search sidebar-search">
        <div class="search-title">文件搜索</div>
        <div class="search-row">
          <input id="fileSearchInput" class="search-input" placeholder="支持 * 和 ? 通配符" />
          <button id="fileSearchBtn" class="search-btn">搜索</button>
        </div>
        <div class="search-options">
          <label><input type="checkbox" id="fileRecursive" checked /> 包含子目录</label>
          <label><input type="checkbox" id="fileWhole" /> 全字匹配</label>
          <label><input type="checkbox" id="fileCase" /> 区分大小写</label>
        </div>
        <div id="fileSearchStats" class="muted search-stats">当前为目录浏览模式</div>
      </div>
      <div class="breadcrumbs" id="breadcrumbs"></div>
      <div class="entry-list" id="entryList"></div>
    </aside>
    <main class="content">
      <div class="content-header">
        <div>
          <div class="muted">当前</div>
          <h2 id="title">/</h2>
        </div>
        <a id="downloadLink" class="download-btn" target="_blank" rel="noreferrer" hidden>打开/下载原文件</a>
      </div>
      <div class="panel-search content-search">
        <div class="search-title">当前文件内搜索</div>
        <div class="search-row">
          <input id="contentSearchInput" class="search-input" placeholder="支持 * 和 ? 通配符" />
          <button id="contentSearchBtn" class="search-btn">搜索</button>
          <button id="contentSearchPrev" class="search-btn secondary" title="上一个 (Shift+Enter)">↑</button>
          <button id="contentSearchNext" class="search-btn secondary" title="下一个 (Enter)">↓</button>
          <button id="contentSearchClear" class="search-btn secondary">清空</button>
        </div>
        <div class="search-options">
          <label><input type="checkbox" id="contentWhole" /> 全字匹配</label>
          <label><input type="checkbox" id="contentCase" /> 区分大小写</label>
        </div>
        <div id="contentSearchStats" class="muted search-stats">当前未选择文件</div>
      </div>
      <div id="preview" class="preview-scroll empty">选择文件开始预览</div>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
